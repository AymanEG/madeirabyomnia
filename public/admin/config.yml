backend:
  name: github
  repo: AymanEG/madeirabyomnia
  branch: main

media_folder: public/images/listings
public_folder: /images/listings

# Decap CMS i18n: single-file strategy, all locales share the same fields/keys
i18n:
  structure: multiple_folders
  locales: [en, pt, es, de, fr]
  default_locale: en

collections:
  - name: listings
    label: "Listings"
    label_singular: "Listing"
    i18n: true
    folder: src/content
    create: true
    slug: "{{slug}}"
    path: "{{locale}}/listings/{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Slug, name: slug, widget: string, i18n: duplicate }
      - { label: "Price (€)", name: price, widget: number, i18n: duplicate }
      - { label: Bedrooms, name: bedrooms, widget: number, i18n: duplicate }
      - { label: Bathrooms, name: bathrooms, widget: number, i18n: duplicate }
      - { label: "Area (m²)", name: area, widget: number, i18n: duplicate }
      - { label: Location, name: location, widget: string, i18n: true }
      - { label: Featured Image, name: image, widget: image, i18n: duplicate }
      - { label: Description, name: body, widget: markdown, i18n: true }
      - { label: Featured, name: featured, widget: boolean, default: false, i18n: duplicate }
