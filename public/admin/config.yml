backend:
  name: github
  repo: YOUR-GITHUB-USERNAME/madeirabyomnia
  branch: main

media_folder: public/images/listings
public_folder: /images/listings

collections:
  - name: listings_en
    label: "Listings — English"
    folder: src/content/en/listings
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Price (€), name: price, widget: number }
      - { label: Bedrooms, name: bedrooms, widget: number }
      - { label: Bathrooms, name: bathrooms, widget: number }
      - { label: Area (m²), name: area, widget: number }
      - { label: Location, name: location, widget: string }
      - { label: Featured image, name: image, widget: image }
      - { label: Description, name: body, widget: markdown }
      - { label: Featured, name: featured, widget: boolean, default: false }

  - name: listings_pt
    label: "Listings — Português"
    folder: src/content/pt/listings
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Preço (€), name: price, widget: number }
      - { label: Quartos, name: bedrooms, widget: number }
      - { label: Casas de banho, name: bathrooms, widget: number }
      - { label: Área (m²), name: area, widget: number }
      - { label: Localização, name: location, widget: string }
      - { label: Imagem principal, name: image, widget: image }
      - { label: Descrição, name: body, widget: markdown }
      - { label: Destaque, name: featured, widget: boolean, default: false }

  - name: listings_fr
    label: "Listings — Français"
    folder: src/content/fr/listings
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Titre, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Prix (€), name: price, widget: number }
      - { label: Chambres, name: bedrooms, widget: number }
      - { label: Salles de bain, name: bathrooms, widget: number }
      - { label: Surface (m²), name: area, widget: number }
      - { label: Localisation, name: location, widget: string }
      - { label: Image principale, name: image, widget: image }
      - { label: Description, name: body, widget: markdown }
      - { label: En vedette, name: featured, widget: boolean, default: false }

  - name: listings_de
    label: "Listings — Deutsch"
    folder: src/content/de/listings
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Preis (€), name: price, widget: number }
      - { label: Schlafzimmer, name: bedrooms, widget: number }
      - { label: Badezimmer, name: bathrooms, widget: number }
      - { label: Fläche (m²), name: area, widget: number }
      - { label: Lage, name: location, widget: string }
      - { label: Hauptbild, name: image, widget: image }
      - { label: Beschreibung, name: body, widget: markdown }
      - { label: Empfohlen, name: featured, widget: boolean, default: false }

  - name: listings_es
    label: "Listings — Español"
    folder: src/content/es/listings
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Precio (€), name: price, widget: number }
      - { label: Dormitorios, name: bedrooms, widget: number }
      - { label: Baños, name: bathrooms, widget: number }
      - { label: Superficie (m²), name: area, widget: number }
      - { label: Ubicación, name: location, widget: string }
      - { label: Imagen principal, name: image, widget: image }
      - { label: Descripción, name: body, widget: markdown }
      - { label: Destacado, name: featured, widget: boolean, default: false }
